services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # DB is NOT exposed to the host — only reachable by backend inside the network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:    production
      PORT:        3001
      # Database
      DB_HOST:     database
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Auth
      JWT_SECRET:  ${JWT_SECRET}
      # Email (optional — leave blank to disable)
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      SMTP_HOST:    ${SMTP_HOST:-}
      SMTP_PORT:    ${SMTP_PORT:-587}
      SMTP_USER:    ${SMTP_USER:-}
      SMTP_PASS:    ${SMTP_PASS:-}
      SMTP_FROM:    ${SMTP_FROM:-}
      # Google OAuth (optional — leave blank to disable)
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL:  ${GOOGLE_CALLBACK_URL:-}
      # Keycloak SSO (optional — leave blank to disable)
      KEYCLOAK_URL:          ${KEYCLOAK_URL:-}
      KEYCLOAK_PUBLIC_URL:   ${KEYCLOAK_PUBLIC_URL:-}
      KEYCLOAK_REALM:        ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID:    ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_CALLBACK_URL: ${KEYCLOAK_CALLBACK_URL:-}
      FRONTEND_URL:         ${FRONTEND_URL}
    volumes:
      - uploads:/app/uploads
    # Backend is NOT exposed to the host — only reachable by frontend nginx
    expose:
      - "3001"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Frontend (nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Keycloak SSO ──────────────────────────────────────────────────────────
  # Opt-in: docker compose --profile keycloak up -d --build
  # See: make keycloak-up  |  make keycloak-setup
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: >
      start
      --http-enabled=true
      --hostname-strict=false
    restart: unless-stopped
    environment:
      # Keycloak DB (keycloak-db service below)
      KC_DB:               postgres
      KC_DB_URL:           jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME:      ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD:      ${KC_DB_PASSWORD}
      # Public hostname — must match what the browser sees
      KC_HOSTNAME_URL:     ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
      # Run behind nginx/ingress proxy
      KC_PROXY:            edge
      # Admin credentials
      KEYCLOAK_ADMIN:          ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    expose:
      - "8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
    profiles:
      - keycloak

  # Dedicated postgres for Keycloak (keeps it isolated from app DB)
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       keycloak
      POSTGRES_USER:     ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - kcdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    profiles:
      - keycloak

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  pgdata:
  uploads:
  kcdata:

# ── Networks ──────────────────────────────────────────────────────────────
# Single internal network — no service is reachable from outside except
# the frontend on FRONTEND_PORT. Database and backend have no host ports.
networks:
  internal:
    driver: bridge
