# Políticas de red: principio de mínimo privilegio.
# ┌──────────┐   /api, /uploads   ┌─────────┐   5432   ┌──────────┐
# │ Internet │ ─────────────────► │ Backend │ ────────► │ Postgres │
# └──────────┘                    └─────────┘           └──────────┘
#      │                               ▲
#      │  /  (SPA)      ┌──────────┐   │ /api proxy
#      └───────────────►│ Frontend │───┘
#                       └──────────┘
---
# El backend solo acepta tráfico del frontend y del ingress-controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ppai-backend-policy
  namespace: ppai
  labels:
    app.kubernetes.io/part-of: ppai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ppai-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ppai-frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3001
          protocol: TCP

---
# El frontend solo acepta tráfico del ingress-controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ppai-frontend-policy
  namespace: ppai
  labels:
    app.kubernetes.io/part-of: ppai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ppai-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80
          protocol: TCP

---
# Postgres solo acepta tráfico del backend y de los Jobs de backup/restore
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ppai-database-policy
  namespace: ppai
  labels:
    app.kubernetes.io/part-of: ppai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ppai-database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ppai-backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: db-ops   # backup + restore jobs
      ports:
        - port: 5432
          protocol: TCP
