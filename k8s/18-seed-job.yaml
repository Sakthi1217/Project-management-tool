# Job para poblar la BD con datos de ejemplo (cuentas de test).
# Solo se necesita la PRIMERA VEZ en un cluster nuevo o después de un restore limpio.
#
# Ejecutar:
#   kubectl apply -f k8s/18-seed-job.yaml
#   kubectl logs -n ppai -l job-name=ppai-seed -f
#   kubectl delete -f k8s/18-seed-job.yaml   # limpiar después
#
# Cuentas creadas: admin@app.com / editor@app.com / viewer@app.com (password: *123)
apiVersion: batch/v1
kind: Job
metadata:
  name: ppai-seed
  namespace: ppai
  labels:
    app.kubernetes.io/name: ppai-seed
    app.kubernetes.io/component: db-ops
    app.kubernetes.io/part-of: ppai
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppai-seed
        app.kubernetes.io/component: db-ops
        app.kubernetes.io/part-of: ppai
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ppai-database 5432; do
                echo "Esperando postgres..."; sleep 2
              done
              echo "✅ Postgres listo."
      containers:
        - name: seed
          # Reemplazar con tu imagen: your-registry.example.com/your-project/pp-ai-backend:v1.0.0
          image: REGISTRY_URL/REGISTRY_PROJECT/pp-ai-backend:latest
          imagePullPolicy: Always
          command: ["node", "dist/db/seed.js"]
          envFrom:
            - configMapRef:
                name: ppai-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      backoffLimit: 3
