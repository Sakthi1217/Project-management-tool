# La imagen de frontend tiene nginx.conf con "proxy_pass http://backend:3001"
# (nombre del servicio en docker-compose). En Kubernetes el Service se llama
# "ppai-backend", por lo que sobreescribimos la config montando este ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ppai-frontend-nginx
  namespace: ppai
  labels:
    app.kubernetes.io/name: ppai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ppai
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 256;

        # Cache de assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy API → backend (nombre del Service en K8s)
        location /api/ {
            proxy_pass http://ppai-backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Proxy uploads → backend
        location /uploads/ {
            proxy_pass http://ppai-backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10M;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
