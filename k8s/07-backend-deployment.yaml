apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppai-backend
  namespace: ppai
  labels:
    app.kubernetes.io/name: ppai-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ppai
spec:
  # ⚠  Mantener en 1 mientras el PVC de uploads sea ReadWriteOnce.
  #    Para escalar subir primero los uploads a object storage.
  replicas: 1
  strategy:
    type: Recreate   # Evita que dos réplicas monten el mismo PVC RWO
  selector:
    matchLabels:
      app.kubernetes.io/name: ppai-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppai-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: ppai
    spec:
      initContainers:
        # Espera a que Postgres esté listo antes de arrancar el backend
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a PostgreSQL en ppai-database:5432..."
              until nc -z ppai-database 5432; do
                echo "  postgres no disponible, reintentando en 2s..."
                sleep 2
              done
              echo "✅ PostgreSQL listo."

      containers:
        - name: backend
          # ── Reemplazar con tu imagen ──────────────────────────────────
          # Ejemplo: your-registry.example.com/your-project/pp-ai-backend:v1.0.0
          # Evitar :latest en producción para garantizar deploys reproducibles
          image: REGISTRY_URL/REGISTRY_PROJECT/pp-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          # Config no-sensible desde ConfigMap
          envFrom:
            - configMapRef:
                name: ppai-config

          # Secretos individuales
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: JWT_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: SMTP_HOST
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: SMTP_PASS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: GOOGLE_CLIENT_SECRET

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 18   # hasta 90s de startup

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ppai-uploads-pvc
