apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppai-frontend
  namespace: ppai
  labels:
    app.kubernetes.io/name: ppai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ppai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ppai-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppai-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ppai
    spec:
      containers:
        - name: frontend
          # Reemplazar con tu imagen: your-registry.example.com/your-project/pp-ai-frontend:v1.0.0
          image: REGISTRY_URL/REGISTRY_PROJECT/pp-ai-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Sobreescribe la nginx.conf que viene bakeada en la imagen
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: nginx-config
          configMap:
            name: ppai-frontend-nginx
