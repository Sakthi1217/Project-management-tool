# ╔══════════════════════════════════════════════════════════════════════╗
# ║  IMPORTANTE: Cambia TODOS los valores antes de aplicar.            ║
# ║  En producción usa Sealed Secrets, ESO o Vault en vez de este      ║
# ║  archivo en texto plano. NO commitas secretos reales al repo.      ║
# ╚══════════════════════════════════════════════════════════════════════╝
apiVersion: v1
kind: Secret
metadata:
  name: ppai-secrets
  namespace: ppai
  labels:
    app.kubernetes.io/part-of: ppai
type: Opaque
stringData:
  # Base de datos Postgres
  DB_PASSWORD: "CAMBIAR_PASSWORD_POSTGRES"

  # JWT — mínimo 32 caracteres aleatorios
  # Generar: openssl rand -hex 32
  JWT_SECRET: "CAMBIAR_JWT_SECRET_CON_32_CHARS_MINIMO"

  # SMTP (dejar vacío si ENABLE_EMAIL=false)
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""

  # Google OAuth (dejar vacío para deshabilitar)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
