# ════════════════════════════════════════════════════════════════════
# Job de RESTORE de PostgreSQL — se aplica MANUALMENTE cuando se necesita.
#
# PASOS:
#   1. Listar backups disponibles:
#        kubectl exec -n ppai -it \
#          $(kubectl get pod -n ppai -l app.kubernetes.io/name=ppai-backup --no-headers -o name | head -1) \
#          -- ls -lh /backups/
#      O si el CronJob no tiene pod activo, usar un pod temporal:
#        kubectl run -n ppai list-backups --rm -it --image=postgres:16-alpine \
#          --overrides='{"spec":{"volumes":[{"name":"b","persistentVolumeClaim":{"claimName":"ppai-backups-pvc"}}],"containers":[{"name":"c","image":"postgres:16-alpine","command":["ls","-lh","/backups"],"volumeMounts":[{"name":"b","mountPath":"/backups"}]}]}}' \
#          -- ls /backups
#
#   2. Editar BACKUP_FILE abajo con el nombre del archivo deseado.
#
#   3. Aplicar el Job:
#        kubectl apply -f k8s/17-restore-job.yaml
#
#   4. Seguir el progreso:
#        kubectl logs -n ppai -l job-name=ppai-restore -f
#
#   5. Una vez finalizado, eliminarlo:
#        kubectl delete -f k8s/17-restore-job.yaml
#
# ⚠  ADVERTENCIA: El restore BORRA todos los datos actuales de la BD.
#    Escalar el backend a 0 réplicas antes de restaurar:
#        kubectl scale deployment ppai-backend -n ppai --replicas=0
#    Y volver a 1 después:
#        kubectl scale deployment ppai-backend -n ppai --replicas=1
# ════════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: Job
metadata:
  name: ppai-restore
  namespace: ppai
  labels:
    app.kubernetes.io/name: ppai-restore
    app.kubernetes.io/component: db-ops
    app.kubernetes.io/part-of: ppai
spec:
  ttlSecondsAfterFinished: 600   # se autodestruye 10 min después de terminar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppai-restore
        app.kubernetes.io/component: db-ops   # permite acceso a Postgres por NetworkPolicy
        app.kubernetes.io/part-of: ppai
    spec:
      restartPolicy: Never
      containers:
        - name: pg-restore
          image: postgres:16-alpine
          env:
            - name: PGHOST
              valueFrom:
                configMapKeyRef:
                  name: ppai-config
                  key: DB_HOST
            - name: PGPORT
              valueFrom:
                configMapKeyRef:
                  name: ppai-config
                  key: DB_PORT
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: ppai-config
                  key: DB_NAME
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: ppai-config
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ppai-secrets
                  key: DB_PASSWORD
            # ── CAMBIAR al nombre del archivo de backup a restaurar ───────
            - name: BACKUP_FILE
              value: "ppai_20260101_020000.dump"   # ← EDITAR este valor
          command:
            - sh
            - -c
            - |
              set -e
              FULL_PATH="/backups/${BACKUP_FILE}"

              echo "▶ Verificando backup: ${FULL_PATH}"
              if [ ! -f "${FULL_PATH}" ]; then
                echo "❌ Error: archivo no encontrado: ${FULL_PATH}"
                echo "   Backups disponibles:"
                ls -lh /backups/*.dump 2>/dev/null || echo "   (ninguno)"
                exit 1
              fi

              echo "⚠  Terminando conexiones activas a la BD..."
              psql -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${PGDATABASE}' AND pid <> pg_backend_pid();"

              echo "🗑  Eliminando esquema actual..."
              psql -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

              echo "♻  Restaurando desde ${FULL_PATH}..."
              pg_restore --no-owner --no-privileges -d "${PGDATABASE}" "${FULL_PATH}"

              echo "✅ Restore completado exitosamente desde ${BACKUP_FILE}"
          volumeMounts:
            - name: backups
              mountPath: /backups
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: ppai-backups-pvc
